name: 記事自動生成

on:
  schedule:
    - cron: "0 21 * * *" # 毎朝6時（JST）に実行
  workflow_dispatch:      # 手動実行も可能
    inputs:
      topic_index:
        description: "生成するトピックのインデックス（0〜14）"
        required: false
        default: "auto"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # リポジトリへのpushを許可
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. コードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js をセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # 3. 依存パッケージをインストール
      - name: Install dependencies
        run: npm ci

      # 4. 次に生成するトピックのインデックスを決定
      - name: Determine topic index
        id: topic
        run: |
          if [ "${{ github.event.inputs.topic_index }}" != "auto" ] && [ -n "${{ github.event.inputs.topic_index }}" ]; then
            echo "index=${{ github.event.inputs.topic_index }}" >> $GITHUB_OUTPUT
          else
            # 既存の記事数をカウントして次のインデックスを決定（15記事で一周）
            COUNT=$(ls content/articles/*.json 2>/dev/null | wc -l)
            INDEX=$(( (COUNT - 3) % 15 ))  # 既存3記事分を除いてローテーション
            if [ $INDEX -lt 0 ]; then INDEX=0; fi
            echo "index=$INDEX" >> $GITHUB_OUTPUT
          fi

      # 5. 記事を生成
      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-article.ts ${{ steps.topic.outputs.index }}

      # 6. 変更があればコミット＆プッシュ（最大3回リトライ）
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 生成した記事ファイルを一時退避
          GENERATED=$(git status --short content/articles/ | awk '{print $2}')
          if [ -z "$GENERATED" ]; then
            echo "新しい記事はありません"
            exit 0
          fi

          for i in 1 2 3; do
            echo "--- push試行 $i/3 ---"
            git fetch origin main
            git rebase origin/main
            git add content/articles/
            if git diff --staged --quiet; then
              echo "新しい記事はありません"
              exit 0
            fi
            ARTICLE_COUNT=$(ls content/articles/*.json | wc -l)
            git commit -m "feat: 記事を自動生成（計${ARTICLE_COUNT}件）"
            git push origin main && exit 0
            echo "push失敗。10秒後にリトライします..."
            git reset HEAD~1
            sleep 10
          done
          echo "3回リトライしましたが失敗しました"
          exit 1
