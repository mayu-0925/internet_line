name: Deploy to Xserver

on:
  push:
    branches:
      - main  # mainブランチにpushされたら自動デプロイ
  workflow_run:
    workflows: ["記事自動生成", "記事リライト"]  # 記事生成・リライトが完了したら起動
    types:
      - completed
  workflow_dispatch:  # 手動実行も可能

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. コードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js をセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # 3. 依存パッケージをインストール
      - name: Install dependencies
        run: npm ci

      # 4. 静的HTMLをビルド（out/ に生成される）
      - name: Build
        run: npm run build

      # 5. out/ を Xserver に FTP でアップロード
      - name: Deploy to Xserver via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/         # ビルド成果物のフォルダ
          server-dir: ${{ secrets.FTP_SERVER_DIR }}  # Xserver の公開ディレクトリ
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
