name: Deploy to Xserver

on:
  push:
    branches:
      - main  # mainブランチにpushされたら自動デプロイ
  workflow_run:
    workflows: ["記事自動生成", "記事リライト", "サムネイル生成"]  # 記事生成・リライト・サムネイル生成が完了したら起動
    types:
      - completed
  workflow_dispatch:  # 手動実行も可能

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. コードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js をセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # 3. 依存パッケージをインストール
      - name: Install dependencies
        run: npm ci

      # 4. 静的HTMLをビルド（out/ に生成される）
      - name: Build
        run: npm run build

      # 5. lftp をインストール
      - name: Install lftp
        run: sudo apt-get install -y lftp

      # 6. out/ を Xserver に FTPS でアップロード
      - name: Deploy to Xserver via FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER" <<EOF
          set net:timeout 60
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set ftp:passive-mode on
          mirror --reverse --delete --verbose --no-perms ./out/ $FTP_SERVER_DIR
          quit
          EOF

      # 7. Google にサイトマップを通知してインデックスを促進
      - name: Ping Google Sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://www.net-choice.jp/sitemap.xml" \
            -o /dev/null -w "HTTP Status: %{http_code}\n"
