name: サムネイル生成

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "記事のslug（例: docomo-hikari-provider-osusume-hikaku）"
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate thumbnail
        env:
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
        run: npx tsx scripts/generate-thumbnail.ts ${{ github.event.inputs.slug }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/thumbnails/ content/articles/
          if git diff --staged --quiet; then
            echo "変更なし"
            exit 0
          fi
          git commit -m "feat: サムネイル生成（${{ github.event.inputs.slug }}）"
          git push origin main
