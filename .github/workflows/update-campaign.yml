name: キャンペーン情報自動更新

on:
  schedule:
    - cron: "0 21 L * *" # 毎月末日 21:00 UTC（翌1日 JST 6:00）
  workflow_dispatch: # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. コードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js をセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # 3. 依存パッケージをインストール
      - name: Install dependencies
        run: npm ci

      # 4. キャンペーン情報を更新
      - name: Update campaign info
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/update-campaign.ts

      # 5. 変更があればコミット＆プッシュ
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet lib/data.ts; then
            echo "キャンペーン情報に変更はありませんでした"
            exit 0
          fi

          TODAY=$(date +"%Y年%m月")
          for i in 1 2 3; do
            echo "--- push試行 $i/3 ---"
            git fetch origin main
            git rebase origin/main
            git add lib/data.ts
            git commit -m "chore: ${TODAY}のキャンペーン情報を自動更新"
            git push origin main && exit 0
            echo "push失敗。10秒後にリトライします..."
            git reset HEAD~1
            sleep 10
          done
          echo "3回リトライしましたが失敗しました"
          exit 1
